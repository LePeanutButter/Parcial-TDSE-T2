<!DOCTYPE html>
<html>
<head>
    <title>Pell Sequence</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<h1>Get Pell Sequence</h1>
<form action="/pell">
    <label for="sequence-input">Input:</label><br>
    <input type="number" id="sequence-input" name="number" value=13><br><br>
    <input type="button" value="Submit" onclick="loadGetMsg()">
</form>
<div id="getrespmsg"></div>
<script>
    function loadGetMsg() {
        let numVar = document.getElementById("sequence-input").value;
        const xhttp = new XMLHttpRequest();
        xhttp.onload = function() {
            document.getElementById("getrespmsg").innerHTML =
            this.responseText;
        }
        xhttp.open("GET", "/pell?n="+numVar);
        xhttp.send();
    }
</script>
</body>
</html>
